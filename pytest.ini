[pytest]
# Disable third-party plugins that are not part of *Hews*' test suite but may
# be auto-discovered in the global Python environment, causing missing-dependency
# errors (e.g. requests-mock → six).
# Disable unrelated third-party plugins and make the *src* directory importable
# as package root so that ``import hews`` works from the tests.
addopts = -p no:requests_mock
pythonpath = src

# Configure pytest-asyncio to use function scope for async fixtures
asyncio_default_fixture_loop_scope = function

